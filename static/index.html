<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apeksha AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🙏 Apeksha</h1>
                <span class="tagline">Hope that thinks.</span>
            </div>
            <button class="new-chat-btn" onclick="resetChat()">+ New Chat</button>
            <div class="sidebar-info">
                <div class="status-item">
                    <span class="label">Model:</span>
                    <span class="value" id="model-name">Loading...</span>
                </div>
                <div class="status-item">
                    <span class="label">Memories:</span>
                    <span class="value" id="memory-count">0</span>
                </div>
                <div class="status-item">
                    <span class="label">Knowledge:</span>
                    <span class="value" id="knowledge-count">0 chunks</span>
                </div>
            </div>
            <div class="sidebar-actions">
                <button onclick="ingestKnowledge()">📚 Ingest Documents</button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <div class="messages" id="messages">
                <div class="welcome-message">
                    <h2>🙏 Namaste! I'm Apeksha.</h2>
                    <p>I'm your local AI assistant. I can build software, search the web, remember things, and learn from your documents.</p>
                    <div class="suggestions">
                        <button onclick="sendSuggestion('Build a React todo app with local storage')">Build a React todo app</button>
                        <button onclick="sendSuggestion('Create a Python REST API with Flask')">Create a Flask API</button>
                        <button onclick="sendSuggestion('Search the web for latest AI news')">Search AI news</button>
                        <button onclick="sendSuggestion('Help me write a Python script to organize my files')">Organize my files</button>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-container">
                    <textarea 
                        id="user-input" 
                        placeholder="Ask Apeksha anything..."
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                        oninput="autoResize(this)"
                    ></textarea>
                    <button class="send-btn" onclick="sendMessage()" id="send-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                </div>
                <p class="disclaimer">Apeksha runs 100% locally. Your data never leaves your machine.</p>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
